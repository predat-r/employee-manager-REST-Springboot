databaseChangeLog:
  - changeSet:
      id: create-departments-table
      author: haris
      changes:
        - createTable:
            tableName: departments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_departments
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: VARCHAR(255)