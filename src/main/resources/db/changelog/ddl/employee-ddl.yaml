databaseChangeLog:
  - changeSet:
      id: create-employees-table
      author: haris
      changes:
        - createTable:
            tableName: employees
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_employees
                    nullable: false

              - column:
                  name: first_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: last_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: job_title
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: salary
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: department_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: employees
            columnNames: email
            constraintName: uk_employees_email

        - addForeignKeyConstraint:
            baseTableName: employees
            baseColumnNames: department_id
            referencedTableName: departments
            referencedColumnNames: id
            constraintName: fk_employees_department